<svg width="760" height="760" viewBox="0 0 760 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TON618 Capital"><g transform="translate(41.176 -118.824) scale(1.32353)">
  <defs>
    <!-- Accretion disk / ring: bright gold core fading to antique at the wings -->
    <linearGradient id="disk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#8A6D2B" stop-opacity="0"/>
      <stop offset="12%" stop-color="#8A6D2B"/>
      <stop offset="36%" stop-color="#C9A24B"/>
      <stop offset="50%" stop-color="#F2E2B0"/>
      <stop offset="64%" stop-color="#C9A24B"/>
      <stop offset="88%" stop-color="#8A6D2B"/>
      <stop offset="100%" stop-color="#8A6D2B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ringg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F2E2B0"/>
      <stop offset="45%" stop-color="#C9A24B"/>
      <stop offset="100%" stop-color="#8A6D2B"/>
    </linearGradient>
    <radialGradient id="coin" cx="42%" cy="36%" r="72%">
      <stop offset="0%"  stop-color="#F4E6B8"/>
      <stop offset="42%" stop-color="#D8B25C"/>
      <stop offset="80%" stop-color="#C9A24B"/>
      <stop offset="100%" stop-color="#9A7B30"/>
    </radialGradient>
    <radialGradient id="diskHaze" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A24B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C9A24B" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <!-- keeps only the front (lower) half of the ring -->
    <clipPath id="frontHalf"><rect x="-160" y="256" width="832" height="300"/></clipPath>
    <!-- window: interior of the gold box, just larger than the sphere; clips the
         disk so its tips are cut off at the frame -->
    <clipPath id="boxWin"><rect x="121" y="121" width="270" height="270"/></clipPath>
  </defs>

  <!-- opaque obsidian window fill: makes the mark self-contained so a single
       version reads on any background (light or dark) -->
  <rect x="120" y="120" width="272" height="272" fill="#0B0B0C"/>

  <!-- BACK of the ring: full disk behind the core, tilted 22deg about the sphere
       center, clipped to the window so its tips are cut at the frame.
       A thin champagne rim gives the disk a luminous halo edge. -->
  <g clip-path="url(#boxWin)">
    <ellipse cx="256" cy="256" rx="307" ry="34" fill="url(#disk)" opacity="0.77" filter="url(#glow)"
             transform="rotate(-22 256 256)"/>
    <ellipse cx="256" cy="256" rx="307" ry="34" fill="none" stroke="#F2E2B0" stroke-width="1.5"
             opacity="0.5" transform="rotate(-22 256 256)"/>
    <ellipse cx="256" cy="256" rx="316" ry="42" fill="none" stroke="#F2E2B0" stroke-width="1"
             opacity="0.3" transform="rotate(-22 256 256)"/>
  </g>

  <!-- compact event-horizon sphere (smaller relative to the window) -->
  <circle cx="256" cy="256" r="100" fill="#0B0B0C"/>

  <!-- bright sphere outline (photon ring) — thicker, grown inward so the outer
       diameter is unchanged (outer edge stays at r103) -->
  <circle cx="256" cy="256" r="91.56" fill="none" stroke="url(#ringg)" stroke-width="22.87" filter="url(#glow)"/>

  <!-- lensed halo arcing over the top of the sphere (clipped to the window) -->
  <g clip-path="url(#boxWin)">
    <path d="M 156 314 A 116 116 0 1 1 356 314" fill="none" stroke="url(#ringg)"
          stroke-width="6" stroke-linecap="round" opacity="0.85" filter="url(#glow)"/>
  </g>

  <!-- central Bitcoin coin (smaller relative to the sphere) -->
  <circle cx="256" cy="256" r="56" fill="#0B0B0C"/>
  <circle cx="256" cy="256" r="52" fill="url(#coin)"/>
  <circle cx="256" cy="256" r="52" fill="none" stroke="#7A5F22" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="45" fill="none" stroke="#F4E6B8" stroke-width="1.6" opacity="0.45"/>

  <!-- Bitcoin "B" symbol, scaled to the smaller coin -->
  <g transform="translate(256 256) scale(0.55) translate(-256 -256)">
    <g fill="#141417">
      <rect x="240" y="190" width="11" height="20" rx="3"/>
      <rect x="261" y="190" width="11" height="20" rx="3"/>
      <rect x="240" y="302" width="11" height="20" rx="3"/>
      <rect x="261" y="302" width="11" height="20" rx="3"/>
      <rect x="226" y="206" width="17" height="100" rx="3"/>
    </g>
    <g fill="none" stroke="#141417" stroke-width="16" stroke-linecap="butt">
      <path d="M 243 214 H 276 A 21 21 0 0 1 276 256 H 243"/>
      <path d="M 243 256 H 282 A 23 23 0 0 1 282 300 H 243"/>
    </g>
  </g>

  <!-- FOREGROUND: only the front (lower) half of the ring, slightly transparent,
       so the near side orbits in front of the dense core; also clipped to the window -->
  <g clip-path="url(#boxWin)">
    <g transform="rotate(-22 256 256)">
      <g clip-path="url(#frontHalf)">
        <ellipse cx="256" cy="256" rx="307" ry="34" fill="url(#disk)" opacity="0.51" filter="url(#glow)"/>
        <ellipse cx="256" cy="256" rx="307" ry="34" fill="none" stroke="#F2E2B0" stroke-width="1.5" opacity="0.5"/>
        <ellipse cx="256" cy="256" rx="316" ry="42" fill="none" stroke="#F2E2B0" stroke-width="1" opacity="0.3"/>
      </g>
    </g>
  </g>

  <!-- gold window box: contains the sphere, just slightly larger; frames the view -->
  <rect x="120" y="120" width="272" height="272" fill="none" stroke="url(#ringg)" stroke-width="6"/>
</g><path d="M310 0V73L523 100V1235H472Q243 1235 150 1215L123 966H32V1341H1335V966H1243L1216 1215Q1133 1233 888 1233H839V100L1052 73V0Z" fill="#C9A24B" transform="translate(137.98 600.00) scale(0.06445 -0.06445)"/>
